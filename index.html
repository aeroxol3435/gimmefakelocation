<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Location API</title>
<style>
body {
    background: #111;
    color: #00ffcc;
    font-family: monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
</style>
</head>
<body>
<pre id="output">Generating...</pre>

<script>
async function getRandomPopulatedPlace() {

    for (let i = 0; i < 15; i++) {

        const lat = (Math.random() * 180 - 90).toFixed(6);
        const lon = (Math.random() * 360 - 180).toFixed(6);

        try {
            const res = await fetch(
                `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}&zoom=10&addressdetails=1`
            );

            const data = await res.json();

            if (!data.address) continue;

            const a = data.address;

            const place =
                a.city ||
                a.town ||
                a.village ||
                a.hamlet ||
                a.municipality;

            if (!place) continue;

            const country = a.country || "Unknown";
            const fullName = `${place}, ${country}`;

            const image =
                `https://staticmap.openstreetmap.de/staticmap.php?center=${lat},${lon}&zoom=11&size=900x500&markers=${lat},${lon},red-pushpin`;

            const rawString = `png_link:${image},name:${fullName}`;

            document.getElementById("output").textContent = rawString;
            return;

        } catch (err) {
            continue;
        }
    }

    document.getElementById("output").textContent =
        "png_link:error,name:No populated place found";
}

getRandomPopulatedPlace();
</script>
</body>
</html>
